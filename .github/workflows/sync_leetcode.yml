name: Sync LeetCode

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *' # Runs daily

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Federation
        uses: actions/checkout@v3

      - name: Sync LeetCode Questions
        uses: joshcai/leetcode-sync@v1.7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          leetcode-csrf-token: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          leetcode-session: ${{ secrets.LEETCODE_SESSION }}
          destination-folder: problems
          verbose: false
          # Strict filter: Only sync questions solved in the last 24-48 hours
          # This prevents pulling your whole historical archive every time
          filter-duplicate-defs: true
          commit-header: "LeetCode Auto-Sync 🤖"

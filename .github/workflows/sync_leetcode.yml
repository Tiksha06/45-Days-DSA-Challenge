name: Sync Leetcode Code and Descriptions

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Full Content Sync Script
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF_TOKEN: ${{ secrets.LEETCODE_CSRF_TOKEN }}
        run: |
          cat << 'EOF' > sync.py
          import os
          import requests
          import json

          session = os.environ.get("LEETCODE_SESSION")
          csrf = os.environ.get("LEETCODE_CSRF_TOKEN")

          if not session or not csrf:
              print("Missing LeetCode credentials.")
              exit(1)

          # Fetch recent accepted submissions
          url = "https://leetcode.com/api/submissions/?offset=0&limit=30&status=10"
          headers = {
              "Cookie": f"LEETCODE_SESSION={session}; csrftoken={csrf}",
              "X-CSRFToken": csrf,
              "Referer": "https://leetcode.com/submissions/"
          }

          response = requests.get(url, headers=headers)
          if response.status_code != 200:
              print("Failed to authenticate.")
              exit(1)

          submissions = response.json().get("submissions_dump", [])
          os.makedirs("problems", exist_ok=True)

          # GraphQL setup to fetch actual question detail content
          graphql_url = "https://leetcode.com/graphql"

          for sub in submissions:
              title_slug = sub["title_slug"]
              title = sub["title"]
              lang = sub["lang"]
              
              if lang != "java":
                  continue
                  
              prob_dir = f"problems/{title_slug}"
              os.makedirs(prob_dir, exist_ok=True)
              
              # Save Code
              with open(f"{prob_dir}/Solution.java", "w") as f:
                  f.write(sub["code"])
              
              # Fetch full question body description via GraphQL
              query = {
                  "query": "query questionContent($titleSlug: String!) { question(titleSlug: $titleSlug) { content } }",
                  "variables": {"titleSlug": title_slug}
              }
              req_headers = {"Content-Type": "application/json", "Cookie": f"csrftoken={csrf}"}
              q_res = requests.post(graphql_url, json=query, headers=req_headers)
              
              content_md = ""
              if q_res.status_code == 200:
                  q_data = q_res.json().get("data", {})
                  if q_data and q_data.get("question"):
                      content_md = q_data["question"].get("content", "")

              # Save full detailed content into README
              with open(f"{prob_dir}/README.md", "w") as f:
                  f.write(f"# {title}\n\n")
                  if content_md:
                      f.write(content_md)
                  else:
                      f.write(f"Automatically synced submission for {title}.")
                  
          print("Successfully synced code and full details!")
          EOF
          python3 sync.py
          
      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add problems/
          git commit -m "Auto-sync LeetCode submissions with FULL details" || echo "No changes"
          git push origin main
